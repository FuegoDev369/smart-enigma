            <line x1="60" y1="8" x2="60" y2="15" stroke="currentColor" stroke-width="1.4" transform="rotate(330 60 60)"/>
          </g>
          <g class="rotor-ring rotor-ring--inner">
            <circle cx="60" cy="60" r="34" fill="none" stroke="currentColor" stroke-width="1"/>
            <line x1="60" y1="26" x2="60" y2="32" stroke="currentColor" stroke-width="1.4" transform="rotate(0 60 60)"/>

      <span class="brand-text">
        <span class="brand-title">SMART ENIGMA</span>
        <span class="brand-sub">Cipher &amp; Secrecy</span>
      </span>
    </p>

    <div class="controls">
      <label class="sr-only" for="langSelect" id="langSelectLabel">Language</label>
      <span class="lang-chip">
        <svg class="icon icon-globe" aria-hidden="true" focusable="false"><use href="#icon-globe"></use></svg>
        <select id="langSelect" aria-label="Choose language">
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="zh">中文</option>
          <option value="es">Español</option>
          <option value="ru">Русский</option>
          <option value="de">Deutsch</option>
          <option value="pt">Português</option>
          <option value="it">Italiano</option>
          <option value="ko">한국어</option>
        </select>
        <svg class="icon icon-chevron" aria-hidden="true" focusable="false"><use href="#icon-chevron-down"></use></svg>
      </span>

      <label class="theme-switch" id="themeLabel" title="Toggle theme">
        <input id="themeToggle" type="checkbox" aria-label="Enable dark mode">
        <svg class="icon icon-sun" aria-hidden="true" focusable="false"><use href="#icon-sun"></use></svg>
        <svg class="icon icon-moon" aria-hidden="true" focusable="false"><use href="#icon-moon"></use></svg>
      </label>
    </div>
  </header>

  <main class="container" id="app">
    <section class="panel key-block" aria-labelledby="keyLabel">
      <span class="panel-corner panel-corner--tl" aria-hidden="true"></span>
      <span class="panel-corner panel-corner--tr" aria-hidden="true"></span>
      <span class="panel-corner panel-corner--bl" aria-hidden="true"></span>
      <span class="panel-corner panel-corner--br" aria-hidden="true"></span>

      <label id="keyLabel" for="keyInput" class="panel-label">
        <svg class="icon" aria-hidden="true" focusable="false"><use href="#icon-key"></use></svg>
        <span id="keyLabelText"></span>
      </label>
      <div class="key-row">
        <div class="input-container">
         <input id="keyInput" type="password" autocomplete="new-password"
         inputmode="text" placeholder="" />
         <button type="button" id="toggleSecret" class="visibility-toggle" aria-label="Show key">
           <svg class="icon" aria-hidden="true" focusable="false"><use id="toggleSecretIcon" href="#icon-eye"></use></svg>
         </button>
        </div>
        <button id="copyKey" class="btn small icon-only" aria-label="Copy key">
          <svg class="icon" aria-hidden="true" focusable="false"><use href="#icon-copy"></use></svg>
        </button>
      </div>

      <div class="options">
        <label class="strong-option">
          <span class="switch">
            <input id="useStrong" type="checkbox" checked />
            <span class="switch-track" aria-hidden="true"></span>
          </span>
          <span id="strongLabel">Max-Enigma (AES-256)</span>
        </label>
        <button id="clearKey" class="btn tiny icon-only" title="Clear key" aria-label="Clear key">
          <svg class="icon" aria-hidden="true" focusable="false"><use href="#icon-x"></use></svg>
        </button>
      </div>
      <p id="weakWarning" class="warning" hidden>
        <svg class="icon" aria-hidden="true" focusable="false"><use href="#icon-alert-triangle"></use></svg>
        <span id="weakWarningText"></span>
      </p>
    </section>

    <section class="panel io-block">
      <span class="panel-corner panel-corner--tl" aria-hidden="true"></span>
      <span class="panel-corner panel-corner--tr" aria-hidden="true"></span>
      <span class="panel-corner panel-corner--bl" aria-hidden="true"></span>
      <span class="panel-corner panel-corner--br" aria-hidden="true"></span>

      <label class="sr-only" for="inputArea" id="inputLabel">Message</label>
      <textarea id="inputArea" rows="8" placeholder=""></textarea>

      <div class="actions" role="toolbar" aria-label="Actions">
        <button id="encryptBtn" class="btn primary">
          <svg class="icon" aria-hidden="true" focusable="false"><use href="#icon-lock-closed"></use></svg>
          <span class="btn-label" id="encryptBtnText"></span>
        </button>
        <button id="decryptBtn" class="btn">
          <svg class="icon" aria-hidden="true" focusable="false"><use href="#icon-lock-open"></use></svg>
          <span class="btn-label" id="decryptBtnText"></span>
        </button>
        <button id="clearBtn" class="btn outline">
          <svg class="icon" aria-hidden="true" focusable="false"><use href="#icon-x"></use></svg>
          <span class="btn-label" id="clearBtnText"></span>
        </button>
      </div>

      <h3 class="result-title">
        <svg class="icon" aria-hidden="true" focusable="false"><use href="#icon-output"></use></svg>
        <span id="resultTitleText"></span>
      </h3>
      <pre id="output" tabindex="0" aria-live="polite"></pre>
      <div class="output-actions">
        <button id="copyOutput" class="btn small">
          <svg class="icon" aria-hidden="true" focusable="false"><use href="#icon-copy"></use></svg>
          <span class="btn-label" id="copyOutputText"></span>
        </button>
        <button id="backToTop" class="btn tiny icon-only" title="Back to top" aria-label="Back to top">
          <svg class="icon" aria-hidden="true" focusable="false"><use href="#icon-arrow-up"></use></svg>
        </button>
      </div>
    </section>

    <hr />

    <section id="about" class="info">
      <h4 class="info-title">
        <svg class="icon" aria-hidden="true" focusable="false"><use href="#icon-info"></use></svg>
        <span id="aboutTitle"></span>
      </h4>
      <p id="aboutContent"></p>
    </section>

    <section id="how" class="info">
      <h4 class="info-title">
        <svg class="icon" aria-hidden="true" focusable="false"><use href="#icon-shield-lock"></use></svg>
        <span id="howTitle"></span>
      </h4>
      <ol id="howSteps"></ol>
      <p id="howNote"></p>
    </section>

  </main>
  <footer class="footer">
    <small>Built by <a href="https://github.com/fuegodev369" target="_blank" rel="noopener noreferrer">@FuegoDev</a> — <a href="https://github.com/fuegodev369/smart-enigma" target="_blank" rel="noopener noreferrer">source on GitHub</a></small>
  </footer>

  <div id="toast" role="status" aria-live="polite" class="toast" hidden>
    <svg class="icon" aria-hidden="true" focusable="false"><use href="#icon-check"></use></svg>
    <span id="toastText"></span>
  </div>

  function t() {
    return translations[currentLang] || translations.en;
  }

  function showToast(msg, ms = 2200) {
    toast.hidden = false;
    toastText.textContent = msg;
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => { toast.hidden = true; }, ms);
  }

  /* -------- Language auto-detection (9 supported languages) -------- */
  function detectLang() {
    const SUPPORTED = ['en', 'fr', 'zh', 'es', 'ru', 'de', 'pt', 'it', 'ko'];
    const nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    const prefix = nav.slice(0, 2);
    return SUPPORTED.includes(prefix) ? prefix : 'en';
  }

  function translateUI(lang) {
    currentLang = translations[lang] ? lang : 'en';
    const d = t();
    html.lang = currentLang;

    $('#langSelectLabel').textContent = d.langSelectLabel;
    langSelect.setAttribute('aria-label', d.langSelectAria);
    themeToggle.setAttribute('aria-label', d.themeAria);

    keyLabelText.textContent = d.labelKey;
    keyInput.placeholder = d.labelKey;
    copyKeyBtn.setAttribute('aria-label', d.copyKeyAria);
    clearKeyBtn.title = d.clearKeyTitle;
    clearKeyBtn.setAttribute('aria-label', d.clearKeyTitle);
    toggleSecret.setAttribute('aria-label', keyInput.type === 'password' ? d.toggleShowKey : d.toggleHideKey);

  /* -------- Legacy substitution cipher (demo only, NOT secure) -------- */
  function generateSubstitution(key) {
    let sum = 0;
    for (let i = 0; i < key.length; i++) sum += key.charCodeAt(i);
    const letterShift = sum % 26;
    const numberShift = sum % 10;
    const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const digits = '0123456789';
    const map = {}, numMap = {};
    for (let i = 0; i < 26; i++) map[alphabet[i]] = alphabet[(i + letterShift) % 26];
    for (let i = 0; i < 10; i++) numMap[digits[i]] = digits[(i + numberShift) % 10];
    return { map, numMap };
  }

  function substituteTransform(text, keyMap, reverse = false) {
    const { map, numMap } = keyMap;
    const rMap = reverse ? Object.fromEntries(Object.entries(map).map(([k, v]) => [v, k])) : map;
    const rNum = reverse ? Object.fromEntries(Object.entries(numMap).map(([k, v]) => [v, k])) : numMap;
    let out = '';
    for (const ch of text) {
      if (/[A-Z]/.test(ch)) out += rMap[ch] || ch;
      else if (/[a-z]/.test(ch)) {
        const up = ch.toUpperCase();
        out += (rMap[up] || up).toLowerCase();
      } else if (/[0-9]/.test(ch)) out += rNum[ch] || ch;
      else out += ch;
    }
    return out;
  }

  /* -------- AES-256-GCM via Web Crypto -------- */
  async function deriveKey(password, salt, iterations = 600000) {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
      baseKey,
      { name: 'AES-GCM', length: 256 },
      true,
      ['encrypt', 'decrypt']
    );
  }

  function concatBuffers(...buffers) {
    const total = buffers.reduce((s, b) => s + (b.byteLength || b.length), 0);
    const tmp = new Uint8Array(total);
    let offset = 0;
    for (const b of buffers) {
      const u = new Uint8Array(b);
      tmp.set(u, offset);
      offset += u.length;
    }
    return tmp.buffer;
  }

  function bufToBase64(buf) {
    return btoa(String.fromCharCode(...new Uint8Array(buf)));
  }
  function base64ToBuf(b64) {
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr.buffer;
  }

  async function encryptAesGcm(plain, password) {
    const enc = new TextEncoder();
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveKey(password, salt);
    const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plain));
    return bufToBase64(concatBuffers(salt.buffer, iv.buffer, ct));
  }

  async function decryptAesGcm(b64blob, password) {
    const blob = base64ToBuf(b64blob);
    const arr = new Uint8Array(blob);
    const salt = arr.slice(0, 16).buffer;
    const iv = arr.slice(16, 28).buffer;
    const ct = arr.slice(28).buffer;
    const key = await deriveKey(password, salt);
    const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(iv) }, key, ct);
    return new TextDecoder().decode(plainBuf);
  }

  function setOutput(text) {
    hasResult = true;
    output.classList.remove('placeholder');
    output.textContent = text;
  }

  /* -------- Core actions -------- */
  async function encryptAction() {
    const d = t();
    try {
      const key = keyInput.value || '';
      if (!key) { showToast(d.noKey); return; }
      const text = inputArea.value || '';
      if (!text) { showToast(d.noInput); return; }

      if (useStrong.checked && window.crypto && crypto.subtle) {
        encryptBtn.disabled = true;
        setOutput(d.encrypting);
        const cipher = await encryptAesGcm(text, key);
        setOutput(cipher);
        showToast(d.encryptedAes);
      } else {
        const keyMap = generateSubstitution(key);
        setOutput(substituteTransform(text, keyMap, false));
        showToast(d.encryptedSub);
      }
    } catch (err) {
      console.error(err);
      showToast(d.genericError);
    } finally {
      encryptBtn.disabled = false;
    }
  }

  async function decryptAction() {
    const d = t();
    try {
      const key = keyInput.value || '';
      if (!key) { showToast(d.noKey); return; }
      const text = inputArea.value || '';
      if (!text) { showToast(d.noInput); return; }

      if (useStrong.checked && window.crypto && crypto.subtle) {
        decryptBtn.disabled = true;
        setOutput(d.decrypting);
        try {
          const plain = await decryptAesGcm(text, key);
          setOutput(plain);
          showToast(d.decryptedAes);
        } catch (e) {
          setOutput('');
          hasResult = false;
          showToast(d.decryptFail);
        }
      } else {
        const keyMap = generateSubstitution(key);
        setOutput(substituteTransform(text, keyMap, true));
        showToast(d.decryptedSub);
      }
    } catch (err) {
      console.error(err);
      showToast(d.genericError);
    } finally {
      decryptBtn.disabled = false;
    }
  }

  /* -------- Utilities -------- */
  async function copyToClipboard(text) {
    const d = t();
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      showToast(d.copied);
    } catch {
      showToast(d.copyFail);
    }
  }

  function clearAll() {
    const d = t();
    if (!confirm(d.clearConfirm)) return;
    inputArea.value = '';
    hasResult = false;
    output.textContent = d.outputPlaceholder;
    output.classList.add('placeholder');
  }

  /* -------- Event wiring -------- */
  langSelect.addEventListener('change', (e) => translateUI(e.target.value));
  themeToggle.addEventListener('change', (e) => {
    html.dataset.theme = e.target.checked ? 'dark' : 'light';
  });
  useStrong.addEventListener('change', updateWeakWarning);

  encryptBtn.addEventListener('click', () => encryptAction());
  decryptBtn.addEventListener('click', () => decryptAction());
  clearBtn.addEventListener('click', () => clearAll());

  copyKeyBtn.addEventListener('click', () => copyToClipboard(keyInput.value));
  copyOutput.addEventListener('click', () => copyToClipboard(hasResult ? output.textContent : ''));

  backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  clearKeyBtn.addEventListener('click', () => { keyInput.value = ''; showToast(t().keyCleared); });

  keyInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) encryptAction();
  });

  toggleSecret.addEventListener('click', () => {
    const showing = keyInput.type === 'text';
    keyInput.type = showing ? 'password' : 'text';
    toggleSecretIcon.setAttribute('href', showing ? '#icon-eye' : '#icon-eye-off');
    toggleSecret.setAttribute('aria-label', showing ? t().toggleShowKey : t().toggleHideKey);
  });

  window.addEventListener('beforeunload', () => {
    try { keyInput.value = ''; } catch (e) {}
  });

  document.addEventListener('DOMContentLoaded', () => {
    const initialLang = detectLang();
    langSelect.value = initialLang;
    translateUI(initialLang);
    updateWeakWarning();

    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    html.dataset.theme = prefersDark ? 'dark' : 'light';
    themeToggle.checked = prefersDark;
  });

})();
  </script>
</body>
</html>
